name: fl_location_web
description: The web implementation of the fl_location plugin.
publish_to: "none"

environment:
  flutter: ">=3.41.0"
  sdk: ">=3.11.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  fl_location_platform_interface:
    path: ../fl_location_platform_interface
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FlLocationWeb
        fileName: fl_location_web.dart
